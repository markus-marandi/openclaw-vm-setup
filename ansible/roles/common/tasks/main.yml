---
- name: Install base packages
  ansible.builtin.apt:
    update_cache: true
    name:
    - curl
    - git
    - ufw
    - fail2ban
    - unattended-upgrades
    - apt-listchanges
    - jq
    - openssl
    - ca-certificates
    - gnupg
    state: present

- name: Install distro Node.js and npm packages
  ansible.builtin.apt:
    name:
    - nodejs
    - npm
    state: present
  when: nodejs_major | default('') | length == 0

- name: Configure NodeSource repository for pinned Node.js major
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_major }}.x | bash -
  args:
    executable: /bin/bash
  when: nodejs_major | default('') | length > 0

- name: Install pinned Node.js major package
  ansible.builtin.apt:
    update_cache: true
    name: nodejs
    state: present
  when: nodejs_major | default('') | length > 0

- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Install Docker repository key
  ansible.builtin.shell: |
    set -euo pipefail
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    executable: /bin/bash
    creates: /etc/apt/keyrings/docker.gpg

- name: Resolve Docker apt architecture
  ansible.builtin.set_fact:
    docker_repo_arch: "{{ docker_arch_map.get(ansible_architecture, ansible_architecture) }}"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_repo_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
    state: present
    filename: docker

- name: Install Docker Engine packages
  ansible.builtin.apt:
    update_cache: true
    name:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Check tailscale binary
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_bin

- name: Install Tailscale
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    executable: /bin/bash
  when: not tailscale_bin.stat.exists

- name: Bring up Tailscale when auth key provided
  ansible.builtin.command: tailscale up --auth-key {{ tailscale_auth_key }}
  when: tailscale_auth_key | default('') | length > 0
  changed_when: true
