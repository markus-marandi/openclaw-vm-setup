---
- name: Ensure admin user exists with expected home
  ansible.builtin.user:
    name: "{{ admin_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    home: "/home/{{ admin_user }}"
    move_home: true
    create_home: true
    state: present

- name: Ensure admin home exists with correct ownership
  ansible.builtin.file:
    path: "/home/{{ admin_user }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Ensure admin .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/.ssh"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0700"

- name: Ensure admin authorized_keys exists with strict permissions
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/.ssh/authorized_keys"
    state: touch
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0600"

- name: Ensure root .ssh directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install same SSH key for root user
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ admin_ssh_public_key }}"
  when: admin_ssh_public_key | length > 0

- name: Install provided SSH key for admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    state: present
    key: "{{ admin_ssh_public_key }}"
  when: admin_ssh_public_key | length > 0

- name: Enforce root authorized_keys permissions
  ansible.builtin.file:
    path: /root/.ssh/authorized_keys
    state: file
    owner: root
    group: root
    mode: "0600"

- name: Read root authorized_keys content
  ansible.builtin.slurp:
    src: /root/.ssh/authorized_keys
  register: root_authorized_keys_raw

- name: Build list of valid root SSH key lines
  ansible.builtin.set_fact:
    root_ssh_key_lines: >-
      {{
        (root_authorized_keys_raw.content | b64decode).splitlines()
        | map('trim')
        | reject('equalto', '')
        | reject('match', '^#')
        | select('match', '^(ssh-(rsa|ed25519)|ecdsa-sha2-nistp)')
        | list
      }}

- name: Mirror root authorized keys into admin authorized_keys
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    state: present
    key: "{{ item }}"
  loop: "{{ root_ssh_key_lines }}"

- name: Ensure at least one SSH key exists for admin
  ansible.builtin.assert:
    that:
    - root_ssh_key_lines | length > 0 or (admin_ssh_public_key | length > 0)
    fail_msg: "No SSH key available. Provide admin_ssh_public_key or ensure /root/.ssh/authorized_keys has a valid key."

- name: Ensure clawdbot user exists
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    shell: /usr/sbin/nologin
    create_home: true
    state: present

- name: Add clawdbot to docker group
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    groups: docker
    append: true

- name: Create npm global directory for admin
  ansible.builtin.file:
    path: "/home/{{ admin_user }}/.npm-global"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0755"

- name: Read npm global prefix for admin
  ansible.builtin.command: npm config get prefix
  become_user: "{{ admin_user }}"
  environment:
    HOME: "/home/{{ admin_user }}"
  register: admin_npm_prefix
  changed_when: false

- name: Configure npm global prefix for admin
  ansible.builtin.command: npm config set prefix /home/{{ admin_user }}/.npm-global
  become_user: "{{ admin_user }}"
  environment:
    HOME: "/home/{{ admin_user }}"
  when: admin_npm_prefix.stdout != "/home/{{ admin_user }}/.npm-global"
  changed_when: true

- name: Read installed OpenClaw version for admin
  ansible.builtin.shell: |
    set -euo pipefail
    npm list -g openclaw --depth=0 --json 2>/dev/null | jq -r '.dependencies.openclaw.version // ""'
  args:
    executable: /bin/bash
  become_user: "{{ admin_user }}"
  environment:
    HOME: "/home/{{ admin_user }}"
    PATH: "/home/{{ admin_user }}/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
  register: openclaw_installed_version
  changed_when: false

- name: Resolve target OpenClaw version from npm latest
  ansible.builtin.command: npm view openclaw version
  become_user: "{{ admin_user }}"
  environment:
    HOME: "/home/{{ admin_user }}"
    PATH: "/home/{{ admin_user }}/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
  register: openclaw_resolved_latest_version
  when: openclaw_version == "latest"
  changed_when: false

- name: Set target OpenClaw version fact
  ansible.builtin.set_fact:
    openclaw_target_version: "{{ openclaw_resolved_latest_version.stdout if openclaw_version == 'latest' else openclaw_version }}"

- name: Install or update OpenClaw CLI for admin
  ansible.builtin.command: npm install -g openclaw@{{ openclaw_version }}
  become_user: "{{ admin_user }}"
  environment:
    HOME: "/home/{{ admin_user }}"
    PATH: "/home/{{ admin_user }}/.npm-global/bin:/usr/local/bin:/usr/bin:/bin"
  when: openclaw_installed_version.stdout != openclaw_target_version
  changed_when: true

- name: Ensure npm global path in admin profile
  ansible.builtin.lineinfile:
    path: "/home/{{ admin_user }}/.profile"
    line: 'export PATH="$HOME/.npm-global/bin:$PATH"'
    create: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Ensure npm global path in admin bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ admin_user }}/.bashrc"
    line: 'export PATH="$HOME/.npm-global/bin:$PATH"'
    create: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"
