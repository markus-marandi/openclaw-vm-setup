---
- name: Ensure OpenClaw state directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "{{ item.mode }}"
  loop:
  - { path: "{{ openclaw_state_dir }}", mode: "0700" }
  - { path: "{{ openclaw_state_dir }}/devices", mode: "0700" }
  - { path: "{{ openclaw_state_dir }}/workspace", mode: "0700" }
  - { path: "{{ openclaw_state_dir }}/workspace/scripts", mode: "0700" }
  - { path: "{{ openclaw_state_dir }}/security-baselines", mode: "0700" }

- name: Check if openclaw config exists
  ansible.builtin.stat:
    path: "{{ openclaw_state_dir }}/openclaw.json"
  register: openclaw_cfg

- name: Generate gateway token when missing
  ansible.builtin.command: openssl rand -hex 32
  register: generated_gateway_token
  when:
  - (openclaw_gateway_token | default('')) | length == 0
  - not openclaw_cfg.stat.exists
  changed_when: true

- name: Set effective gateway token fact
  ansible.builtin.set_fact:
    effective_gateway_token: >-
      {{
        (openclaw_gateway_token | default(''))
        if (openclaw_gateway_token | default('')) | length > 0
        else (
          generated_gateway_token.stdout
          if (generated_gateway_token is defined and generated_gateway_token.stdout is defined)
          else ''
        )
      }}

- name: Write OpenClaw baseline config when missing
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ openclaw_state_dir }}/openclaw.json"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
    force: "{{ openclaw_manage_config_drift | bool }}"

- name: Ensure paired.json exists
  ansible.builtin.copy:
    dest: "{{ openclaw_state_dir }}/devices/paired.json"
    content: "{}\n"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0600"
    force: false

- name: Deploy nightly audit script
  ansible.builtin.copy:
    src: "{{ openclaw_audit_script_src }}"
    dest: "{{ openclaw_state_dir }}/workspace/scripts/nightly-security-audit.sh"
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_user }}"
    mode: "0700"

- name: Install nightly audit cron job for clawdbot
  ansible.builtin.cron:
    name: openclaw-nightly-security-audit
    user: "{{ openclaw_user }}"
    minute: "{{ openclaw_audit_cron_minute }}"
    hour: "{{ openclaw_audit_cron_hour }}"
    job: "{{ openclaw_state_dir }}/workspace/scripts/nightly-security-audit.sh"
    state: present

- name: Check immutable flag on nightly audit script
  ansible.builtin.command: lsattr {{ openclaw_state_dir }}/workspace/scripts/nightly-security-audit.sh
  register: audit_script_lsattr
  failed_when: false
  changed_when: false

- name: Set immutable flag on nightly audit script when missing
  ansible.builtin.command: chattr +i {{ openclaw_state_dir }}/workspace/scripts/nightly-security-audit.sh
  when:
  - audit_script_lsattr.rc == 0
  - "'i' not in ((audit_script_lsattr.stdout.split() | first) | default(''))"
  changed_when: true

- name: Generate config baseline hash as clawdbot
  ansible.builtin.shell: |
    set -euo pipefail
    sha256sum ~/.openclaw/openclaw.json > ~/.openclaw/.config-baseline.sha256
    chmod 600 ~/.openclaw/.config-baseline.sha256
  args:
    executable: /bin/bash
  become_user: "{{ openclaw_user }}"
  environment:
    HOME: "/home/{{ openclaw_user }}"

- name: Print post-bootstrap next steps
  ansible.builtin.debug:
    msg:
    - "SAFETY: Verify SSH login works as '{{ admin_user }}' in a new terminal before closing root session."
    - "Then run as {{ admin_user }}: openclaw onboard --install-daemon"
    - "Or run as {{ admin_user }}: openclaw tui"
