# config.example.yaml
# OpenClaw Environment & Security Configuration Example
# Instructions: Copy this file to a secure location, rename to config.yaml (or similar),
# and inject these values into your environment or openclaw.json manually.
# DO NOT COMMIT THIS FILE TO VERSION CONTROL IF IT CONTAINS ACTUAL SECRETS.

security:
  # Prompt Injection API Guard
  # This section configures the external service used to scan prompts before execution.
  # Example: Lakera Guard, PromptArmor, or a custom internal service.
  prompt_injection_guard:
    enabled: true
    provider: "lakera" # Options: lakera, promptarmor, custom
    endpoint: "https://api.lakera.ai/v2/guard"
    # Provide the API key for the guard service here:
    api_key: "b9b4...5db9" # <-- Replace with your actual full key 'clawdbot'
    # Action to take if injection is detected
    on_detect: "hard_abort" # Options: hard_abort, warn_and_continue, ask_human

  # Sandboxing (Highly Recommended)
  # Ensure tools like `exec` run in an isolated environment.
  sandboxing:
    enabled: true
    runtime: "docker" # Options: docker, kubernetes

  # Browser SSRF Policy
  # Refer to: https://docs.openclaw.ai/gateway/security#browser-ssrf-policy-trusted-network-default
  browser_ssrf:
    dangerouslyAllowPrivateNetwork: false
    # List domains the browser is allowed to access
    hostnameAllowlist:
      - "*.github.com"
      - "api.trusted-service.com"
    # Explicit exceptions, leave empty normally
    allowedHostnames: []

credentials:
  # Main LLM Provider Configuration
  llm_provider:
    name: "openai" # Options: openai, anthropic, google
    model: "gpt-4o" # Use the strongest available model for tool-enabled agents
    api_key: "YOUR_LLM_PROVIDER_API_KEY_HERE"

  # Optional: Security Intelligence / AML Checks
  business_risk_control:
    aml_service:
      provider: "misttrack"
      api_key: "YOUR_MISTTRACK_API_KEY_HERE"
      threshold_score: 90 # Hard abort if score >= 90
